<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover">
<meta name="theme-color" content="#0d0d12">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Stitch · AI 资讯</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🤖</text></svg>">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{--b:#f4f5f7;--s:#fff;--sh:#eef0f4;--bd:rgba(0,0,0,.07);--t:#1a1d23;--ts:#6b7280;--tm:#9ca3af;--ac:#6366f1;--ff:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Noto Sans SC","Hiragino Sans GB","Microsoft YaHei",Roboto,sans-serif;--fm:"SF Mono","Fira Code","Fira Mono","JetBrains Mono",monospace;--r:12px;--sb-h:54px;--bn-h:56px;--shad:0 1px 3px rgba(0,0,0,.04),0 1px 2px rgba(0,0,0,.06)}
@media(prefers-color-scheme:dark){:root{--b:#0d0d12;--s:#17171e;--sh:#1f1f28;--bd:rgba(255,255,255,.07);--t:#ededef;--ts:#9d9da3;--tm:#6b6b72;--shad:0 1px 3px rgba(0,0,0,.2)}}

html,body{height:100%;overflow:hidden}
body{font-family:var(--ff);background:var(--b);color:var(--t);-webkit-font-smoothing:antialiased;padding-bottom:env(safe-area-inset-bottom,0)}

/* ── Header ── */
.hdr{position:fixed;top:0;left:0;right:0;z-index:100;background:rgba(255,255,255,.78);backdrop-filter:blur(28px) saturate(180%);-webkit-backdrop-filter:blur(28px) saturate(180%);border-bottom:1px solid var(--bd);padding:8px 14px;padding-top:calc(8px + env(safe-area-inset-top,0));display:flex;align-items:center;justify-content:space-between;gap:8px;min-height:var(--sb-h)}
@media(prefers-color-scheme:dark){.hdr{background:rgba(13,13,18,.82)}}
.hdr-lg{font-size:1em;font-weight:700;background:linear-gradient(135deg,#6366f1,#8b5cf6,#a855f7);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;white-space:nowrap;display:flex;align-items:center;gap:5px}
.hdr-lg::before{content:"🤖";-webkit-text-fill-color:initial}
.hdr-r{display:flex;align-items:center;gap:6px;flex-shrink:0}
.hdr-upd{font-size:.62em;color:var(--tm);white-space:nowrap;font-family:var(--fm)}
.hdr-rf{width:32px;height:32px;border-radius:50%;border:none;background:var(--sh);color:var(--ts);font-size:.9em;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:.2s;flex-shrink:0}
.hdr-rf:active{transform:scale(.9);background:var(--bd)}
.hdr-rf.spin svg{animation:spin .8s linear}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── Pull-to-refresh indicator ── */
.ptr{position:fixed;top:var(--sb-h);left:0;right:0;z-index:99;display:flex;align-items:center;justify-content:center;height:0;overflow:hidden;transition:height .3s,opacity .3s;opacity:0;font-size:.72em;color:var(--ts);gap:5px}
.ptr.show{height:36px;opacity:1}
.ptr-spinner{width:14px;height:14px;border:2px solid var(--bd);border-top-color:var(--ac);border-radius:50%;animation:spin .6s linear infinite}

/* ── Search bar ── */
.sr{position:fixed;top:calc(var(--sb-h) + env(safe-area-inset-top,0));left:0;right:0;z-index:99;padding:8px 14px;background:var(--b);border-bottom:1px solid var(--bd)}
.sr-i{width:100%;padding:10px 14px;border:1px solid var(--bd);border-radius:var(--r);font-size:.82em;background:var(--s);color:var(--t);outline:none;transition:border-color .2s;font-family:var(--ff)}
.sr-i:focus{border-color:var(--ac);box-shadow:0 0 0 3px #6366f120}
.sr-i::placeholder{color:var(--tm)}

/* ── Source filter pills ── */
.sf{position:fixed;top:calc(var(--sb-h) + env(safe-area-inset-top,0) + 46px);left:0;right:0;z-index:98;padding:6px 14px;background:var(--b);overflow-x:auto;overflow-y:hidden;white-space:nowrap;scrollbar-width:none;-ms-overflow-style:none;border-bottom:1px solid var(--bd);display:flex;gap:4px;align-items:center}
.sf::-webkit-scrollbar{display:none}
.sf-pl{padding:4px 10px;font-size:.7em;font-weight:500;border-radius:14px;cursor:pointer;white-space:nowrap;transition:.2s;border:1px solid var(--bd);background:var(--s);color:var(--ts);flex-shrink:0;line-height:1.4}
.sf-pl:active{transform:scale(.95)}
.sf-pl.act{background:var(--ac);color:#fff;border-color:var(--ac);font-weight:600}
.sf-pl.lang-en{--ac:#3b82f6}
.sf-pl.lang-zh{--ac:#f59e0b}
.sf-pl.src{--ac:var(--c,var(--tm))}
.sf-pl.src.act{background:var(--c,var(--ac));border-color:var(--c,var(--ac))}

/* ── Scrollable content area ── */
.sc{position:fixed;top:calc(var(--sb-h) + env(safe-area-inset-top,0) + 46px + 36px);left:0;right:0;bottom:calc(var(--bn-h) + env(safe-area-inset-bottom,0));overflow-y:auto;-webkit-overflow-scrolling:touch;padding:0}
.sc::-webkit-scrollbar{width:3px}
.sc::-webkit-scrollbar-thumb{background:var(--bd);border-radius:3px}

/* ── Trending section ── */
.tr{padding:10px 14px 4px}
.tr-h{font-size:.75em;font-weight:700;display:flex;align-items:center;gap:6px;margin-bottom:8px}
.tr-h-sp{flex:1}
.tr-upd{font-size:.58em;font-weight:400;color:var(--tm);font-family:var(--fm)}
.tr-g{display:flex;gap:8px;overflow-x:auto;scrollbar-width:none;padding-bottom:6px}
.tr-g::-webkit-scrollbar{display:none}
.tr-cd{flex-shrink:0;width:220px;background:var(--s);border-radius:10px;padding:10px 12px;border:1px solid var(--bd);text-decoration:none;color:inherit;transition:.15s;display:block}
.tr-cd:active{transform:scale(.97);background:var(--sh)}
.tr-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:3px}
.tr-n{font-size:.7em;font-weight:600;font-family:var(--fm);color:var(--ac);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1;min-width:0;margin-right:4px}
.tr-st{font-size:.62em;color:#f59e0b;flex-shrink:0}
.tr-d{font-size:.65em;color:var(--ts);line-height:1.35;margin-bottom:4px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.tr-f{display:flex;gap:3px;flex-wrap:wrap}
.tr-lang{font-size:.55em;padding:1px 5px;border-radius:3px;background:var(--sh);color:var(--tm);font-family:var(--fm)}

/* ── Article feed ── */
.fd{padding:8px 14px 10px;display:flex;flex-direction:column;gap:8px}
.fd-empty{text-align:center;padding:40px 16px;color:var(--tm);font-size:.78em}

/* ── Article card ── */
.ac{display:block;background:var(--s);border-radius:var(--r);border:1px solid var(--bd);padding:12px 14px;text-decoration:none;color:inherit;transition:.15s;box-shadow:var(--shad);position:relative;overflow:hidden}
.ac:active{transform:scale(.98);background:var(--sh)}
.ac.read{opacity:.55}
.ac.read .ac-t{color:var(--ts)}
.ac-t{font-size:.82em;font-weight:600;line-height:1.4;margin-bottom:4px;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
.ac-sm{font-size:.72em;color:var(--ts);line-height:1.45;margin-bottom:6px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.ac-f{display:flex;align-items:center;gap:5px;flex-wrap:wrap}
.ac-bdg{font-size:.58em;padding:2px 7px;border-radius:5px;font-weight:500;white-space:nowrap;border:1px solid;line-height:1.3}
.ac-new{font-size:.55em;padding:1px 5px;border-radius:3px;font-weight:700;background:#dc262615;color:#dc2626;letter-spacing:.3px}
.ac-dt{font-size:.6em;color:var(--tm);margin-left:auto;white-space:nowrap}
.ac-st{background:none;border:none;cursor:pointer;padding:3px;font-size:.85em;transition:transform .15s;flex-shrink:0;line-height:1;border-radius:4px;color:var(--tm)}
.ac-st:active{transform:scale(1.3)}
.ac-st.starred{color:#f59e0b}

/* ── Skeleton loading ── */
.sk{padding:8px 14px 10px;display:flex;flex-direction:column;gap:8px}
.sk-cd{background:var(--s);border-radius:var(--r);border:1px solid var(--bd);padding:12px 14px}
.sk-l{height:14px;background:linear-gradient(90deg,var(--sh) 25%,var(--bd) 50%,var(--sh) 75%);background-size:200% 100%;animation:shimmer 1.5s infinite;border-radius:6px;margin-bottom:6px}
.sk-l:last-child{margin-bottom:0}
.sk-l.w70{width:70%}
.sk-l.w50{width:50%}
.sk-l.w90{width:90%}
.sk-l.w40{width:40%}
.sk-l.w30{width:30%}
@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}

/* ── Bottom nav ── */
.bn{position:fixed;bottom:0;left:0;right:0;z-index:100;background:rgba(255,255,255,.85);backdrop-filter:blur(28px) saturate(180%);-webkit-backdrop-filter:blur(28px) saturate(180%);border-top:1px solid var(--bd);display:flex;overflow-x:auto;scrollbar-width:none;padding-bottom:env(safe-area-inset-bottom,0);height:var(--bn-h)}
@media(prefers-color-scheme:dark){.bn{background:rgba(13,13,18,.85)}}
.bn::-webkit-scrollbar{display:none}
.bn-it{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px;padding:4px 8px;border:none;background:none;cursor:pointer;color:var(--tm);font-size:.55em;transition:.2s;flex-shrink:0;min-width:48px;position:relative}
.bn-it:active{transform:scale(.92)}
.bn-it .bn-i{font-size:1.4em;line-height:1}
.bn-it .bn-n{font-size:.9em;line-height:1.2;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:60px}
.bn-it.act{color:var(--ac);font-weight:600}
.bn-it.act::after{content:'';position:absolute;top:0;left:50%;transform:translateX(-50%);width:20px;height:2px;background:var(--ac);border-radius:0 0 2px 2px}

/* ── Starred tab ── */
.bn-st{color:#f59e0b!important}
.bn-st.act::after{background:#f59e0b!important}

/* ── Footer ── */
.ft{text-align:center;padding:14px 14px 8px;font-size:.6em;color:var(--tm);line-height:1.6}

/* ── Slide-in animation ── */
@keyframes fi{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.ac{animation:fi .35s ease-out}

/* ── Error state ── */
.err{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;color:var(--ts);font-size:.85em;padding:20px;max-width:300px}
.err-t{font-size:2em;margin-bottom:10px}

/* ── Tablet / Desktop ── */
@media(min-width:640px){
.fd{flex-direction:row;flex-wrap:wrap;max-width:1200px;margin:0 auto}
.ac{width:calc(50% - 4px)}
}
@media(min-width:1024px){
.ac{width:calc(33.33% - 6px)}
}
</style>
</head>
<body>

<!-- Header -->
<div class="hdr">
  <span class="hdr-lg">Stitch · AI</span>
  <div class="hdr-r">
    <span class="hdr-upd" id="hdrUpd"></span>
    <button class="hdr-rf" id="hdrRf" onclick="manualRefresh()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 2v6h-6M3 12a9 9 0 0 1 15.36-5.36L21 8M3 22v-6h6M21 12a9 9 0 0 1-15.36 5.36L3 16"/></svg>
    </button>
  </div>
</div>

<!-- Pull-to-refresh indicator -->
<div class="ptr" id="ptr">
  <div class="ptr-spinner"></div>
  <span>刷新中...</span>
</div>

<!-- Search bar -->
<div class="sr"><input class="sr-i" id="sr" type="text" placeholder="搜索文章标题或摘要..." oninput="doSearch()"></div>

<!-- Source filter pills -->
<div class="sf" id="sf"></div>

<!-- Scrollable content -->
<div class="sc" id="sc">

  <!-- Trending -->
  <div class="tr" id="trSec" style="display:none">
    <div class="tr-h"><span>🔥 GitHub Trending · AI 项目</span><span class="tr-h-sp"></span><span class="tr-upd" id="trUpd"></span></div>
    <div class="tr-g" id="trG"></div>
  </div>

  <!-- Article feed -->
  <div class="fd" id="fd"></div>

  <!-- Footer -->
  <div class="ft">每日自动更新 · Stitch Design System · <span id="ftUpd"></span></div>
</div>

<!-- Bottom nav -->
<div class="bn" id="bn"></div>

<script src="data.js"></script>
<script>
(function(){
/* ── Check data loaded ── */
if(typeof APP_DATA==='undefined'){
  document.getElementById('fd').innerHTML='<div class="err"><div class="err-t">⚠️</div>数据加载失败，请刷新页面重试</div>';
  return;
}
var D=APP_DATA;

/* ── State ── */
var STATE={activeTab:'all',activeSource:null,search:'',stars:{},read:{}};
var SK='ai_n_st',RK='ai_n_rd';
try{STATE.stars=JSON.parse(localStorage.getItem(SK)||'{}')}catch(e){}
try{STATE.read=JSON.parse(localStorage.getItem(RK)||'{}')}catch(e){}

/* ── Helpers ── */
function shortSrc(s){
  // Use mapped source names from data
  var m = {};
  // Build from SOURCE_SHORT-like structure in data
  if (D.shortNames) {
    m = D.shortNames;
  }
  return m[s] || s.slice(0, 12) + (s.length > 12 ? '…' : '');
}
function fmtDate(ds){
  if(!ds)return'';
  ds=ds.trim();
  var ms=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  if(ds.length>=10&&ds[4]==='-'){var p=ds.slice(0,10).split('-');return parseInt(p[1])+'月'+parseInt(p[2])+'日';}
  for(var i=0;i<ms.length;i++){var idx=ds.indexOf(ms[i]);if(idx>=0){var b=ds.slice(0,idx).trim();if(b.endsWith(','))b=b.slice(0,-1).trim();var d=b.match(/\d+/);return (i+1)+'月'+(d?parseInt(d[0])+'日':'');}}
  return ds.slice(0,10);
}
function saveStars(){localStorage.setItem(SK,JSON.stringify(STATE.stars))}
function saveRead(){localStorage.setItem(RK,JSON.stringify(STATE.read))}
function toggleStar(url,e){
  if(e){e.stopPropagation();e.preventDefault()}
  if(STATE.stars[url])delete STATE.stars[url];
  else STATE.stars[url]=1;
  saveStars();render();
}
function markRead(url){
  if(!STATE.read[url]){STATE.read[url]=1;saveRead()}
}
function escHtml(s){
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}
function escAttr(s){return s.replace(/'/g,"%27")}

/* ── Get all cards flat ── */
function allCards(){
  var cards=[];
  D.sections.forEach(function(s){s.cards.forEach(function(c){cards.push(c)})});
  return cards;
}

/* ── Filter cards ── */
function getFilteredCards(){
  var cards=allCards();
  var q=STATE.search.toLowerCase().trim();

  // Search filter
  if(q){cards=cards.filter(function(c){return c.title.toLowerCase().indexOf(q)>=0||c.summary.toLowerCase().indexOf(q)>=0})}

  // Tab filter
  if(STATE.activeTab==='__s__'){
    cards=cards.filter(function(c){return STATE.stars[c.url]});
  }else if(STATE.activeTab!=='all'){
    cards=cards.filter(function(c){
      var sec=D.sections.find(function(s){return s.cards.indexOf(c)>=0});
      return sec&&sec.name===STATE.activeTab;
    });
  }

  // Source filter
  if(STATE.activeSource){
    cards=cards.filter(function(c){return c.source===STATE.activeSource});
  }

  return cards;
}

/* ── Render source pills ── */
function renderPills(){
  var html='';
  // Lang filters
  html+='<span class="sf-pl act" data-filter="all" onclick="setSource(null)">全部</span>';
  html+='<span class="sf-pl lang-en" data-filter="en" onclick="setSource(\'__en__\')">English</span>';
  html+='<span class="sf-pl lang-zh" data-filter="zh" onclick="setSource(\'__zh__\')">中文</span>';
  // Source pills
  var srcKeys=Object.keys(D.sources).sort();
  srcKeys.forEach(function(k){
    var c=D.sources[k].color||'#6b7280';
    var active=STATE.activeSource===k?'act':'';
    html+='<span class="sf-pl src" data-filter="'+k+'" style="--c:'+c+'" onclick="setSource(\''+k.replace(/'/g,"\\'")+'\')">'+k+'</span>';
  });
  document.getElementById('sf').innerHTML=html;
}

/* ── Render trending ── */
function renderTrending(){
  var sec=document.getElementById('trSec');
  var g=document.getElementById('trG');
  var up=document.getElementById('trUpd');
  if(!D.trending||!D.trending.length){sec.style.display='none';return}
  sec.style.display='';
  up.textContent=D.fetched_at||'';
  g.innerHTML='';
  D.trending.forEach(function(r){
    var desc=r.description?escHtml(r.description.slice(0,120)):'';
    var st=r.stars>=1000?(r.stars/1000).toFixed(1)+'k':r.stars;
    var lang=r.language?'<span class="tr-lang">'+escHtml(r.language)+'</span>':'';
    g.innerHTML+='<a href="'+escAttr(r.url)+'" target="_blank" rel="noopener" class="tr-cd"><div class="tr-hd"><span class="tr-n">'+escHtml(r.name)+'</span><span class="tr-st">⭐ '+st+'</span></div><div class="tr-d">'+desc+'</div><div class="tr-f">'+lang+'</div></a>';
  });
}

/* ── Render cards ── */
function renderCards(cards){
  var fd=document.getElementById('fd');
  if(!cards.length){fd.innerHTML='<div class="fd-empty">😴 没有匹配的文章</div>';return}
  var html='';
  cards.forEach(function(c,i){
    var readClass=STATE.read[c.url]?'read':'';
    var starClass=STATE.stars[c.url]?'starred':'';
    var srcColor=D.sources[c.source]?D.sources[c.source].color:'#6b7280';
    var srcShort=shortSrc(c.source);
    var date=fmtDate(c.date);
    var isNew=c.is_new?'<span class="ac-new">NEW</span>':'';
    var urlEsc=escAttr(c.url);
    html+='<a class="ac '+readClass+'" data-url="'+c.url+'" href="'+urlEsc+'" target="_blank" rel="noopener" onclick="markRead(\''+urlEsc+'\')" style="animation-delay:'+(i*0.03)+'s"><div class="ac-t">'+escHtml(c.title)+'</div><div class="ac-sm">'+escHtml(c.summary)+'</div><div class="ac-f"><button class="ac-st '+starClass+'" onclick="toggleStar(\''+urlEsc+'\',event)" title="星标">'+(STATE.stars[c.url]?'⭐':'☆')+'</button>'+isNew+'<span class="ac-bdg" style="color:'+srcColor+';border-color:'+srcColor+'44;background:'+srcColor+'15">'+escHtml(srcShort)+'</span><span class="ac-dt">'+date+'</span></div></a>';
  });
  fd.innerHTML=html;
}

/* ── Render bottom nav ── */
function renderNav(){
  var bn=document.getElementById('bn');
  var html='';
  // All tab
  html+='<button class="bn-it'+(STATE.activeTab==='all'?' act':'')+'" onclick="switchTab(\'all\')"><span class="bn-i">📰</span><span class="bn-n">全部</span></button>';
  // Starred tab
  var su=Object.keys(STATE.stars).length;
  html+='<button class="bn-it bn-st'+(STATE.activeTab==='__s__'?' act':'')+'" onclick="switchTab(\'__s__\')"><span class="bn-i">⭐</span><span class="bn-n">星标'+(su?' '+su:'')+'</span></button>';
  // Category tabs
  if(D.tabs){
    D.tabs.forEach(function(t){
      html+='<button class="bn-it'+(STATE.activeTab===t.name?' act':'')+'" onclick="switchTab(\''+t.name.replace(/'/g,"\\'")+'\')"><span class="bn-i">'+t.icon+'</span><span class="bn-n">'+t.name+'</span></button>';
    });
  }
  bn.innerHTML=html;
}

/* ── Main render ── */
function render(){
  var cards=getFilteredCards();
  renderPills();
  renderTrending();
  renderCards(cards);
  renderNav();
  updateTimer();
}

/* ── Timer ── */
function updateTimer(){
  var el=document.getElementById('hdrUpd');
  var ft=document.getElementById('ftUpd');
  if(!D.fetched_at){el.textContent='';ft.textContent='';return}
  var now=new Date();
  var ftDate=new Date(D.fetched_at);
  var diff=Math.floor((now-ftDate)/60000);
  var txt;
  if(diff<1)txt='刚刚更新';
  else if(diff<60)txt=diff+'分钟前更新';
  else if(diff<1440)txt=Math.floor(diff/60)+'小时前更新';
  else txt=Math.floor(diff/1440)+'天前更新';
  el.textContent=txt;
  ft.textContent=D.fetched_at.slice(0,16).replace('T',' ');
}

/* ── Public API ── */
window.setSource=function(s){
  if(s==='__en__'){
    STATE.activeSource=STATE.activeSource==='__en__'?null:'__en__';
  }else if(s==='__zh__'){
    STATE.activeSource=STATE.activeSource==='__zh__'?null:'__zh__';
  }else{
    STATE.activeSource=STATE.activeSource===s?null:s;
  }
  render();
};

window.switchTab=function(name){
  STATE.activeTab=name;
  render();
};

window.doSearch=function(){
  STATE.search=document.getElementById('sr').value;
  render();
};

window.toggleStar=function(url,e){toggleStar(url,e)};
window.markRead=function(url){markRead(url)};

/* ── Pull-to-refresh ── */
(function(){
  var sc=document.getElementById('sc');
  var ptr=document.getElementById('ptr');
  var startY=0,pulling=false,moved=false;
  sc.addEventListener('touchstart',function(e){
    if(sc.scrollTop<=0){startY=e.touches[0].clientY;pulling=true;moved=false}
  },{passive:true});
  sc.addEventListener('touchmove',function(e){
    if(!pulling)return;
    var dy=e.touches[0].clientY-startY;
    if(dy>30&&sc.scrollTop<=0&&!moved){moved=true;ptr.classList.add('show')}
  },{passive:true});
  sc.addEventListener('touchend',function(){
    if(moved){ptr.classList.add('show');manualRefresh()}
    pulling=false;
  },{passive:true});
})();

/* ── Auto refresh ── */
var autoTimer=null;
function startAutoRefresh(){
  if(autoTimer)clearInterval(autoTimer);
  autoTimer=setInterval(function(){
    fetch('data.js?t='+Date.now())
    .then(function(r){return r.text()})
    .then(function(txt){
      try{
        var newData = JSON.parse(txt.replace('const APP_DATA = ','').replace(/;$/,''));
        if(newData && newData.total) {
          D = newData;
          // Re-cache shortNames
          if(D.shortNames) window._shortNames = D.shortNames;
          render();
        }
      } catch(e) {}
    })
    .catch(function(){});
  },300000); // 5 min
}

/* ── Manual refresh ── */
window.manualRefresh=function(){
  var btn=document.getElementById('hdrRf');
  btn.classList.add('spin');
  var ptr=document.getElementById('ptr');
  ptr.classList.add('show');
  fetch('data.js?t='+Date.now())
  .then(function(r){return r.text()})
  .then(function(txt){
    try{
      var newData = JSON.parse(txt.replace('const APP_DATA = ','').replace(/;$/,''));
      if(newData && newData.total) {
        D = newData;
        if(D.shortNames) window._shortNames = D.shortNames;
        render();
      }
    } catch(e) {}
  })
  .catch(function(){})
  .finally(function(){
    setTimeout(function(){
      btn.classList.remove('spin');
      ptr.classList.remove('show');
    },800);
  });
};

/* ── Init ── */
render();
startAutoRefresh();

})();
</script>
</body>
</html>
